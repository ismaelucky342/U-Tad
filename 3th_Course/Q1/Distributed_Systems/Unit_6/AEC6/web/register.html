<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mini Twitter</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">X</div>
            <h1 class="auth-title">Crear Cuenta</h1>
            
            <div id="message" class="message hidden"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="Elige un nombre de usuario"
                        minlength="3"
                        required
                    >
                    <small style="color: var(--text-secondary); font-size: 12px;">
                        Mínimo 3 caracteres
                    </small>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email (opcional)</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="tu@email.com"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Elige una contraseña segura"
                        minlength="6"
                        required
                    >
                    <small style="color: var(--text-secondary); font-size: 12px;">
                        Mínimo 6 caracteres
                    </small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="Repite tu contraseña"
                        minlength="6"
                        required
                    >
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    Registrarse
                </button>
            </form>
            
            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANTE: Reemplazar con tu URL de API Gateway
        const API_URL = 'https://YOUR-API-GATEWAY-URL.amazonaws.com/prod/userRegister';
        
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const registerBtn = document.getElementById('registerBtn');

        // Función para mostrar mensajes
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message message-${type}`;
            messageDiv.classList.remove('hidden');
            
            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 5000);
        }

        // Manejar submit del formulario
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validaciones
            if (!username || !password) {
                showMessage('Por favor completa todos los campos obligatorios', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('El nombre de usuario debe tener al menos 3 caracteres', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }
            
            // Deshabilitar botón mientras se procesa
            registerBtn.disabled = true;
            registerBtn.textContent = 'Registrando...';
            
            try {
                // Llamar a la función Lambda
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        email: email || null
                    })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                // Verificar respuesta
                if (data.status === 'OK' || data.success === true) {
                    showMessage('¡Registro exitoso! Redirigiendo al login...', 'success');
                    
                    // Redirigir a login después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    
                } else {
                    showMessage(data.message || 'Error al registrar usuario', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Registrarse';
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión. Verifica tu configuración de API.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Registrarse';
            }
        });
    </script>
</body>
</html>
