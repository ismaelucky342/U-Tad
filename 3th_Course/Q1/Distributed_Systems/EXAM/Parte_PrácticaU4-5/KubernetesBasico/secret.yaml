# Secret para almacenar información confidencial (contraseñas, tokens, etc.)
# Los valores deben estar codificados en base64

apiVersion: v1
kind: Secret         # Tipo de objeto: Secret (almacena datos sensibles)
metadata:
  name: db-secret    # Nombre del Secret
  labels:
    app: web
type: Opaque         # Tipo de Secret (Opaque es el tipo por defecto)
data:
  # Los valores están en base64. Para codificar: echo -n "myuser" | base64
  database_user: bXl1c2Vy           # "myuser" en base64
  database_password: bXlwYXNzd29yZA==  # "mypassword" en base64
  
# Nota: Para usar estos secrets en un Pod, se pueden montar como volúmenes
# o como variables de entorno en el deployment.yaml
